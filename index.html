<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zarkolia Health</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zarkolia">
    <meta name="theme-color" content="#4a5d4e">
    <link rel="apple-touch-icon" href="https://github.com/pzaro/my-order-form/blob/main/images/Zarkolia%20Health%20Order%20Form.jpg?raw=true&v=final">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4a5d4e;
            --accent: #10b981;
            --bg: #f4f6f4;
            --white: #ffffff;
            --text: #2d3748;
            --border: #cbd5e0;
            --gray: #718096;
            --danger: #dc2626;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 150px; }
        .main-wrapper { max-width: 1400px; margin: 0 auto; padding: clamp(10px, 3vw, 40px); }

        header { text-align: center; padding: 40px 0; }
        header h1 { font-family: 'Montserrat'; font-size: clamp(2.2rem, 8vw, 3.8rem); color: var(--primary); margin: 0; cursor: pointer; text-transform: uppercase; letter-spacing: -1px; }
        header h1 span { color: var(--gray); font-weight: 300; margin-left: 5px; }

        #hourglass { display: none; animation: spin 2s infinite linear; color: var(--accent); margin-left: 10px; vertical-align: middle; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .customer-header { background: var(--white); border-radius: 35px; padding: clamp(20px, 5vw, 40px); border: 3px solid var(--primary); margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .customer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border); font-weight: 600; font-size: 1.1rem; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 1100px) { .dashboard-grid { grid-template-columns: 1.8fr 1.2fr; align-items: start; } }

        .order-item {
            display: grid;
            grid-template-columns: 85px 1fr auto;
            grid-template-areas:
                "img info total"
                "btns btns btns"
                "science science science"
                "qty qty qty";
            align-items: center; padding: 25px; background: #fff; border-radius: 40px; border: 1px solid var(--border); margin-bottom: 25px; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .p-img { grid-area: img; width: 80px; height: 80px; object-fit: contain; border-radius: 10px; }
        .stock-label { display: none; color: #f59e0b; font-weight: 800; font-size: 0.85rem; }

        /* SCIENCE UI ELEMENTS */
        .science-btn { color: var(--gray); text-decoration: underline; cursor: pointer; font-size: 0.75rem; font-weight: 800; margin-top: 5px; display: inline-block; }
        .science-box { grid-area: science; display: none; background: #f8fafc; padding: 25px; border-radius: 20px; border-left: 6px solid var(--primary); margin: 5px 0 15px 0; font-size: 0.85rem; line-height: 1.6; color: #4a5568; }
        .science-box h4 { color: var(--primary); margin: 15px 0 5px; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        .science-box h4:first-child { margin-top: 0; }

        .quick-btns { grid-area: btns; display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .q-btn { flex: 1 1 90px; padding: 18px 5px; border: none; border-radius: 20px; background: #eef2f0; font-size: 1rem; font-weight: 800; color: var(--primary); cursor: pointer; transition: 0.3s; min-width: 80px; }
        .q-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); }

        .qty-controls { grid-area: qty; display: flex; align-items: center; justify-content: space-between; background: #f7faf9; padding: 15px; border-radius: 25px; border: 1px solid #e2e8f0; }
        .qty-btn { width: 55px; height: 55px; border: none; background: #fff; border-radius: 18px; font-weight: 900; font-size: 2rem; cursor: pointer; color: var(--primary); }
        .qty-input { width: 100px; text-align: center; border: none; background: transparent; font-weight: 800; font-size: 1.8rem; color: var(--primary); }

        .billing-card { background: #fff; border-radius: 50px; padding: clamp(30px, 5vw, 50px); border: 3px solid var(--primary); position: sticky; top: 20px; }
        .summary-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; font-weight: 600; }
        .summary-row.total { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 900; color: var(--primary); border-top: 5px solid var(--accent); padding-top: 25px; margin-top: 25px; }

        .mini-box { margin-top: 18px; padding: 14px 16px; background: #f8faf8; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 0.95rem; }
        .mini-box h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 0.95rem; text-transform: uppercase; }
        .mini-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; font-size: 0.92rem; }
        .gift-line { color: var(--danger); font-weight: 800; }
        .discount-line { color: var(--accent); font-weight: 800; }

        .sticky-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: #fff; padding: 15px clamp(15px, 4vw, 40px); z-index: 1000; border-top: 4px solid var(--accent); }
        .sticky-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; gap: 15px; flex-wrap: wrap; }
        .sticky-price-val { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; }
        .sticky-badge { background: var(--accent); color: white; padding: 6px 14px; border-radius: 10px; font-weight: 900; }

        .btn-confirm { width: 100%; padding: 25px; background: var(--accent); color: white; border: none; border-radius: 25px; font-size: 1.6rem; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 35px; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3); }
        textarea { width: 100%; height: 110px; border-radius: 20px; border: 2px solid var(--border); padding: 15px; margin-top: 20px; font-family: inherit; resize: none; }
    </style>
</head>
<body id="mainBody">
    <div class="main-wrapper">
        <header>
            <h1 onclick="toggleAdminMode()">ZARKOLIA<span>HEALTH</span> <span id="hourglass">⏳</span></h1>
        </header>

        <form id="orderForm" onsubmit="return false;">
            <section class="customer-header">
                <div class="customer-grid">
                    <div class="input-group"><label>ΑΦΜ</label><input type="text" id="afm" placeholder="9 ψηφία" inputmode="numeric"></div>
                    <div class="input-group"><label>Επωνυμία</label><input type="text" id="eponimia"></div>
                    <div class="input-group"><label>Email</label><input type="email" id="email"></div>
                    <div class="input-group"><label>Κινητό</label><input type="tel" id="kinito"></div>
                    <div class="input-group"><label>Σταθερό</label><input type="tel" id="stathero"></div>
                    <div class="input-group"><label>ΔΟΥ</label><input type="text" id="doy"></div>
                </div>
            </section>

            <div class="dashboard-grid">
                <div id="orderGrid"></div>

                <div class="sidebar">
                    <section class="billing-card">
                        <label style="display:flex; align-items:center; gap:14px; margin-bottom:20px; cursor:pointer; font-weight:700;">
                            <input type="checkbox" name="payment" value="Αντικαταβολή Μετρητά" onclick="onlyOne(this)" style="width:25px; height:25px;">
                            Μετρητά (+2%)
                        </label>
                        <label style="display:flex; align-items:center; gap:14px; margin-bottom:30px; cursor:pointer; font-weight:700;">
                            <input type="checkbox" name="payment" value="Επιταγή 60 Ημερών" onclick="onlyOne(this)" style="width:25px; height:25px;">
                            Επιταγή 60 Ημερών
                        </label>

                        <div class="summary-row"><span>Αρχική Αξία:</span><span id="init-net">0.00 €</span></div>
                        <div class="summary-row" style="color:var(--accent)"><span>Mix Εκπτώσεις:</span><span id="mix-disc">- 0.00 €</span></div>
                        <div class="summary-row" style="color:var(--accent)"><span>Έκπτωση Τζίρου:</span><span id="vol-disc">- 0.00 €</span></div>
                        <div class="summary-row" style="color:var(--accent)"><span>Έκπτωση Μετρητών:</span><span id="cash-disc">- 0.00 €</span></div>
                        <div class="summary-row" style="border-top:1px solid #eee; padding-top:15px; margin-top:10px;"><span>Καθαρή Αξία:</span><span id="net-invoice" style="font-weight:800">0.00 €</span></div>
                        <div class="summary-row"><span>ΦΠΑ (24%):</span><span id="vat-val">0.00 €</span></div>
                        <div class="summary-row total"><span>ΣΥΝΟΛΟ</span><span id="total-val">0.00 €</span></div>

                        <div class="mini-box">
                            <h4>Δώρα</h4>
                            <div id="gift-breakdown">Δεν υπάρχουν δώρα ακόμη.</div>
                        </div>

                        <div class="mini-box">
                            <h4>Ανάλυση Εκπτώσεων</h4>
                            <div id="discount-breakdown">Δεν υπάρχουν εκπτώσεις ακόμη.</div>
                        </div>

                        <textarea id="remarks" placeholder="Σημειώσεις..."></textarea>
                        <button type="button" class="btn-confirm" onclick="processOrder()">Ολοκλήρωση</button>
                    </section>
                </div>
            </div>
        </form>
    </div>

    <div class="sticky-bar">
        <div class="sticky-content">
            <span id="sticky-total" class="sticky-price-val">0.00 €</span>
            <span id="progress-text" class="sticky-progress-text"></span>
            <span id="sticky-badge" class="sticky-badge">0% DISC.</span>
        </div>
    </div>

    <script>
        // ΕΝΣΩΜΑΤΩΣΗ ΕΠΙΣΤΗΜΟΝΙΚΩΝ ΔΕΔΟΜΕΝΩΝ (SCI OBJECTS)
        const sciTotalRepair = {
            act: "Centella Asiatica, Hypericum Perforatum, Linum Seed Oil, Avocado Oil, Calamine, Sea Buckthorn, Honey, Mastic, Hyaluronic Acid, Vit E.",
            ind: "Επιβαρυμένο και ερεθισμένο δέρμα, ανάγκη επανόρθωσης επιφανειακού φραγμού, ξηρότητα και αφυδάτωση, καταπραϋντική περιποίηση περιοχών με επιφανειακή καταπόνηση, τραχύτητα και δυσφορία.",
            mech: "Centella: Υποστήριξη επούλωσης & κολλαγονική δραστηριότητα. Hypericum: Καταπραϋντική φροντίδα. Μέλι: Υγρό επουλωτικό περιβάλλον. Calamine: Ανακούφιση ερεθισμού. Υαλουρονικό: Humectant ενυδάτωση. Φυτικά έλαια: Μείωση TEWL & ενίσχυση φραγμού."
        };

        const sciZplastCream = {
            act: "Μαστίχα Χίου, Βαλσαμόχορτο, Μέλι, Καλαμίνη, Καλέντουλα, Zea mays, Ιπποφαές, Αβοκάντο.",
            ind: "Ερεθισμένο δέρμα, ήπια επιφανειακή δερματική καταπόνηση, ξηρότητα και αίσθημα τραβήγματος, φροντίδα δέρματος με ανάγκη καταπράυνσης, υποστηρικτική περιποίηση μικροτραυματισμών και barrier support.",
            mech: "Hypericum / καλέντουλα: βοτανική υποστήριξη με καταπραϋντικό ενδιαφέρον. Μέλι: συμβολή σε προστατευτικό / υγρό επουλωτικό περιβάλλον. Καλαμίνη: τοπική ανακούφιση ερεθισμού. Μαστίχα / ιπποφαές / αβοκάντο: αντιοξειδωτική και barrier-support δράση."
        };

        const sciBruiseOff = {
            act: "Ουρία 10%, Άρνικα 10%, Ριγανέλαιο, Μελισσόχορτο.",
            ind: "Μώλωπες, τοπικό οίδημα, τοπική δυσφορία μετά από μικροκακώσεις, καταπραϋντική φροντίδα της περιοχής εφαρμογής.",
            mech: "Άρνικα: παραδοσιακή χρήση για μώλωπες / τοπική φλεγμονώδη αντίδραση. Ουρία: ενυδατική και ήπια κερατολυτική δράση. Μελισσόχορτο / ριγανέλαιο: βοτανική υποστηρικτική καταπραϋντική συμβολή."
        };

        const sciZboost = {
            act: "NAC 300 mg, Ψευδάργυρος, Σελήνιο, ALA (άλφα-λιποϊκό οξύ), CoQ10, Ginger.",
            ind: "Αντιοξειδωτική υποστήριξη, υποστήριξη φυσιολογικής λειτουργίας ανοσοποιητικού, καταστάσεις αυξημένου οξειδωτικού στρες, υποστήριξη ενεργειακού μεταβολισμού, συμπληρωματική υποστήριξη σε κόπωση.",
            mech: "NAC: πρόδρομος της γλουταθειόνης. CoQ10: υποστήριξη μιτοχονδριακής παραγωγής ενέργειας. Ψευδάργυρος/Σελήνιο: συμμετοχή σε αντιοξειδωτικά ένζυμα. ALA: redox-cycling. Ginger: αντιοξειδωτικό ενδιαφέρον."
        };

        // Ο ΚΑΤΑΛΟΓΟΣ ΤΩΝ ΠΡΟΪΟΝΤΩΝ ΣΑΣ (ΜΕ ΤΙΣ ΕΙΚΟΝΕΣ ΚΑΙ ΤΑ SCI DATA)
        const products = [
            { name: 'Zplast Total Repair Cream 30ml', price: 10.21, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Zplast%20Total%20Repair.jpeg", sci: sciTotalRepair },
            { name: 'Zplast Total Repair 50ml', price: 14.60, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Zplast%20Total%20Repair.jpeg", sci: sciTotalRepair },
            { name: 'Zplast Total Repair 100ml', price: 26.80, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Zplast%20Total%20Repair.jpeg", sci: sciTotalRepair },
            { name: 'ZplastCream 40gr', price: 12.30, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/ZplastCream%2040gr.jpg", sci: sciZplastCream },
            { name: 'ZplastCream 100gr', price: 24.79, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/ZplastCream%2040gr.jpg", sci: sciZplastCream },
            { name: 'Bruise Off cream 50ml', price: 5.60, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Bruise%20Off%20Bite%20Out%20&%20Pain%20Free%20cream.jpg", sci: sciBruiseOff },
            { name: 'Bruise Off cream 100ml', price: 9.50, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Bruise%20Off%20Bite%20Out%20&%20Pain%20Free%20cream.jpg", sci: sciBruiseOff },
            { name: 'Z-boost 30 caps', price: 14.93, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Z-boost%2030%20caps.jpg", sci: sciZboost },
            { name: 'Z-boost 12 caps', price: 6.99, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Z-boost%2030%20caps.jpg", sci: sciZboost },
            { name: 'Hydralia Face cream 50ml', price: 8.90, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Hydralia%20Face%20Cream%2050ml.jpg", sci: { act: "Υαλουρονικό οξύ, Έλαιο Αβοκάντο, Έλαιο Jojoba, Αμυγδαλέλαιο, Aloe vera.", ind: "Ξηρό ή αφυδατωμένο δέρμα, καθημερινή ενυδάτωση προσώπου, δέρμα με αίσθημα τραβήγματος, υποστήριξη δερματικού φραγμού.", mech: "Υαλουρονικό: συγκράτηση νερού στην επιδερμίδα. Aloe vera: humectant. Jojoba/αβοκάντο: μαλακτική, θρεπτική και barrier-support δράση." } },
            { name: 'Revitacell Plus Face cream 50ml', price: 10.69, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Revitacell%20Plus%20Face%20cream%2050ml.jpg", sci: { act: "Έλαιο ροδιού, Υαλουρονικό οξύ, Μαστίχα Χίου, Βιταμίνη Ε, Έλαιο Jojoba, Έλαιο Αβοκάντο.", ind: "Αφυδατωμένο δέρμα, θαμπό δέρμα, δέρμα με απώλεια ελαστικότητας, πρόωρη γήρανση, ανάγκη ενίσχυσης δερματικού φραγμού.", mech: "Υαλουρονικό: ενισχύει ενυδάτωση. Έλαιο ροδιού: αντιοξειδωτική υποστήριξη. Μαστίχα Χίου: καταπραϋντική φροντίδα. Βιταμίνη Ε: προστασία λιπιδικών δομών." } },
            { name: 'Revitace Eyes cream Luce 30ml', price: 10.10, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Revitace%20Eyes%20cream%20Luce%2030ml.jpg", sci: { act: "Ιπποκαστανιά / Escin, Άρνικα, Υαλουρονικό οξύ.", ind: "Περιοφθαλμική αφυδάτωση, αίσθηση κούρασης, φροντίδα για αίσθηση βάρους / ήπιου οιδήματος.", mech: "Escin: υποστήριξη μικροκυκλοφορίας και οιδήματος. Υαλουρονικό: ενυδάτωση. Άρνικα: παραδοσιακή τοπική καταπραϋντική χρήση." } },
            { name: 'Alveolair Sir', price: 7.65, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Alveolair%20Sir.jpg", sci: { act: "Αλθέα, Ευκάλυπτος, Θυμάρι, Κράνι (Cornus mas), Ιπποφαές.", ind: "Ερεθισμένος λαιμός, βήχας ως υποστηρικτική βοτανική φροντίδα, ανάγκη για μαλακτική υποστήριξη βλεννογόνου.", mech: "Αλθέα: demulcent / μαλακτική δράση σε βλεννογόνους. Θυμάρι: αναπνευστική υποστήριξη. Ευκάλυπτος: σχετίζεται με αίσθηση αποσυμφόρησης." } },
            { name: 'NUTRI MX PROBIOTIC Premium (18 ΠΡΟΒΙΟΤΙΚΑ - 10 Billion CFU) 30 caps', price: 8.96, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/NUTRI%20MX%20PROBIOTIC%20PREMIUM.jpg", sci: { act: "18 στελέχη (Bifidobacterium, Lactobacillus), περίπου 10 billion CFU ανά κάψουλα.", ind: "Αποκατάσταση εντερικού μικροβιώματος, υποστήριξη μετά από αντιβίωση, λειτουργικές διαταραχές εντέρου.", mech: "Ανταγωνισμός παθογόνων μικροοργανισμών, ενίσχυση εντερικού φραγμού, modulation τοπικής ανοσολογικής απόκρισης." } },
            { name: 'NUTRI MX MAGNESIUM +B6 (200 mg +5mg) 30 tab', price: 5.98, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/NUTRI%20MX%20MAGNESIUM%201%20%CE%A4%CE%B5%CE%BC.jpg", sci: { act: "Magnesium 200 mg, Vitamin B6 5 mg.", ind: "Κόπωση, μυϊκή λειτουργία, νευρομυϊκή υποστήριξη, έντονη φυσική δραστηριότητα.", mech: "Μαγνήσιο: ενζυμικές αντιδράσεις, νευρομυϊκή λειτουργία, παραγωγή ενέργειας. Βιταμίνη B6: μεταβολισμός αμινοξέων, λειτουργία νευρικού συστήματος." } },
            { name: 'NUTRI MX A-Z ΠΟΛΥΒΙΤΑΜΙΝΗ 30 TAB', price: 6.51, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/NUTRI%20MX%20A-Z.jpg", sci: { act: "Πλήρες φάσμα Βιταμινών (A, B, C, D, E, K1) και Μετάλλων + Lutein 0.5 mg.", ind: "Γενική διατροφική υποστήριξη, κάλυψη αυξημένων αναγκών μικροθρεπτικών, κόπωση / έντονος ρυθμός ζωής.", mech: "Πολυπαραγοντική ενίσχυση ενζυμικών/μεταβολικών οδών, παραγωγή ενέργειας, ανοσολογική λειτουργία και αντιοξειδωτική άμυνα." } },
            { name: 'NUTRI MX OMEGA 3 30 Softgel Caps', price: 6.87, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/NUTRI%20MX%20OMEGA%203.jpg", sci: { act: "Fish Oil 1000 mg (EPA 180 mg, DHA 120 mg).", ind: "Υποστήριξη καρδιαγγειακής υγείας, συμβολή στη φυσιολογική λειτουργία εγκεφάλου, υποστήριξη όρασης.", mech: "EPA / DHA: ενσωμάτωση σε κυτταρικές μεμβράνες, ρύθμιση εικοσανοειδών και φλεγμονωδών μονοπατιών." } },
            { name: 'NUTRI MX JOINT (GLUCOSAMINE + CHONDROITINE + MSM +COLLAGEN) 30 TAB', price: 10.16, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/NUTRI%20MX%20JOINT.jpg", sci: { act: "Glucosamine 500 mg, MSM 133.3 mg, Chondroitin 100 mg, Collagen 100 mg, Citrus bioflavonoids 100 mg, Ginger 5 mg.", ind: "Υποστήριξη αρθρώσεων, χόνδρων και συνδέσμων, συμπληρωματική φροντίδα σε αυξημένη επιβάρυνση μυοσκελετικού.", mech: "Glucosamine / chondroitin: δομική υποστήριξη χόνδρου. MSM: θειούχος υποστηρικτικός παράγοντας. Collagen: υποστήριξη συνδετικού ιστού." } },
            { name: 'NUTRI MX D3 + K2 (4000 IU +100μg) 30 tab', price: 7.90, img: "https://github.com/pzaro/zarkolia-images/blob/main/NUTRI%20MX%20D3%20k2.png?raw=true", sci: { act: "Vitamin D3 4000 IU (100 μg), Vitamin K2 (MK-7) 100 μg.", ind: "Υποστήριξη οστικής υγείας, φυσιολογικός μεταβολισμός ασβεστίου, υποστήριξη μυϊκής λειτουργίας.", mech: "Vitamin D3: αυξάνει εντερική απορρόφηση ασβεστίου. Vitamin K2: συμμετέχει στην καρβοξυλίωση της οστεοκαλσίνης." } },
            { name: 'Zarkolia Cosmetic pack', price: 23.89, img: "https://raw.githubusercontent.com/pzaro/my-order-form/main/images/Zarkolia%20Cosmetic%20pack.jpg", sci: { act: "Hydralia Face Cream + Revitacell Plus Face Cream + Revitace Eyes Cream.", ind: "Ολοκληρωμένη καθημερινή αντιοξειδωτική, ενυδατική και επανορθωτική φροντίδα προσώπου και περιοφθαλμικής περιοχής.", mech: "Συνδυαστική δράση υαλουρονικού οξέος, ελαίου ροδιού, μαστίχας Χίου και escin για πλήρη δερματική προστασία." } }
        ];

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9kAYLBBaQDTXsqLFS2rZqskcAn1qf3ia_bYrWz-MN4v95y44Bmz4w0n-crgLlXCnqSA/exec";
        
        // ΟΛΗ Η ΔΙΚΗ ΣΑΣ ΛΟΓΙΚΗ ΑΝΕΠΑΦΗ!
        const MIX_GROUPS = [
            {
                code: "ZPLAST_ALL",
                title: "Zplast Mix",
                products: [
                    'ZplastCream 40gr',
                    'ZplastCream 100gr',
                    'Zplast Total Repair Cream 30ml',
                    'Zplast Total Repair 50ml',
                    'Zplast Total Repair 100ml'
                ],
                tiers: [
                    { minQty: 20, pct: 15 },
                    { minQty: 10, pct: 10 }
                ]
            },
            {
                code: "ZBOOST",
                title: "Z-boost mix",
                products: ['Z-boost 30 caps', 'Z-boost 12 caps'],
                tiers: [
                    { minQty: 20, pct: 15 },
                    { minQty: 10, pct: 10 }
                ]
            },
            {
                code: "BRUISE_OFF",
                title: "Bruise Off mix",
                products: ['Bruise Off cream 50ml', 'Bruise Off cream 100ml'],
                tiers: [
                    { minQty: 20, pct: 15 },
                    { minQty: 10, pct: 10 }
                ]
            },
            {
                code: "NUTRI_MX",
                title: "NUTRI MX mix",
                products: [
                    'NUTRI MX PROBIOTIC Premium (18 ΠΡΟΒΙΟΤΙΚΑ - 10 Billion CFU) 30 caps',
                    'NUTRI MX MAGNESIUM +B6 (200 mg +5mg) 30 tab',
                    'NUTRI MX A-Z ΠΟΛΥΒΙΤΑΜΙΝΗ 30 TAB',
                    'NUTRI MX OMEGA 3 30 Softgel Caps',
                    'NUTRI MX JOINT (GLUCOSAMINE + CHONDROITINE + MSM +COLLAGEN) 30 TAB',
                    'NUTRI MX D3 + K2 (4000 IU +100μg) 30 tab'
                ],
                tiers: [
                    { minQty: 24, pct: 15 },
                    { minQty: 15, pct: 10 }
                ]
            }
        ];

        const NUTRI_MX_PRODUCTS = [
            'NUTRI MX PROBIOTIC Premium (18 ΠΡΟΒΙΟΤΙΚΑ - 10 Billion CFU) 30 caps',
            'NUTRI MX MAGNESIUM +B6 (200 mg +5mg) 30 tab',
            'NUTRI MX A-Z ΠΟΛΥΒΙΤΑΜΙΝΗ 30 TAB',
            'NUTRI MX OMEGA 3 30 Softgel Caps',
            'NUTRI MX JOINT (GLUCOSAMINE + CHONDROITINE + MSM +COLLAGEN) 30 TAB',
            'NUTRI MX D3 + K2 (4000 IU +100μg) 30 tab'
        ];

        document.addEventListener("DOMContentLoaded", () => {
            renderProducts();
            document.getElementById('afm').addEventListener('input', lookupCustomer);
            updateTotals();
        });

        async function lookupCustomer() {
            let afm = document.getElementById('afm').value.trim();
            if (afm.length >= 8) {
                document.getElementById('hourglass').style.display = 'inline-block';
                try {
                    const r = await fetch(`${SCRIPT_URL}?action=lookup&afm=${encodeURIComponent(afm)}`);
                    const d = await r.json();
                    if (d.success) {
                        document.getElementById('eponimia').value = d.data.eponimia || "";
                        document.getElementById('email').value = d.data.email || "";
                        document.getElementById('kinito').value = d.data.kinito || "";
                        document.getElementById('stathero').value = d.data.stathero || "";
                        document.getElementById('doy').value = d.data.doy || "";
                    }
                } catch (e) {
                    console.error("lookupCustomer error:", e);
                }
                document.getElementById('hourglass').style.display = 'none';
            }
        }

        function isNutriMX(productName) {
            return NUTRI_MX_PRODUCTS.includes(productName);
        }

        function getQuickButtons(productName, index) {
            if (isNutriMX(productName)) {
                return `
                    <button type="button" class="q-btn" onclick="setQty(${index}, 6)">6</button>
                    <button type="button" class="q-btn" onclick="setQty(${index}, 12)">12</button>
                    <button type="button" class="q-btn" onclick="setQty(${index}, 18)">18</button>
                    <button type="button" class="q-btn" onclick="setQty(${index}, 24)">24</button>
                `;
            }

            return `
                <button type="button" class="q-btn" onclick="setQty(${index}, 6)">6</button>
                <button type="button" class="q-btn" onclick="setQty(${index}, 9)">9+1</button>
                <button type="button" class="q-btn" onclick="setQty(${index}, 18)">18+3</button>
                <button type="button" class="q-btn" onclick="setQty(${index}, 24)">24+6</button>
            `;
        }

        // ΕΝΣΩΜΑΤΩΣΗ ΤΟΥ SCIENCE UI ΜΕΣΑ ΣΤΗ ΔΙΚΗ ΣΑΣ RENDER LOGIC
        function renderProducts() {
            const container = document.getElementById('orderGrid');
            products.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <img src="${p.img}" class="p-img" alt="${p.name}">
                    <div class="p-info">
                        <strong>${p.name}</strong>
                        <small style="display:block; font-weight:700; color:#718096;">${p.price.toFixed(2)} €</small>
                        <div id="stock-${i}" class="stock-label">...</div>
                        <span class="science-btn" onclick="toggleScience(${i})">ℹ️ Επιστημονική Τεκμηρίωση</span>
                    </div>
                    <div style="font-weight:900; color:var(--primary); font-size:1.4rem;" id="total-${i}">0.00 €</div>
                    <div id="science-${i}" class="science-box">
                        <h4>Βασικές Δραστικές</h4><p>${p.sci ? p.sci.act : ''}</p>
                        <h4>Ενδείξεις</h4><p>${p.sci ? p.sci.ind : ''}</p>
                        <h4>Μηχανισμοί Δράσης</h4><p>${p.sci ? p.sci.mech : ''}</p>
                    </div>
                    <div class="quick-btns">
                        ${getQuickButtons(p.name, i)}
                    </div>
                    <div class="qty-controls">
                        <button type="button" class="qty-btn" onclick="changeQty(${i},-1)">-</button>
                        <input type="number" id="qty-${i}" value="0" class="qty-input" oninput="updateTotals()">
                        <button type="button" class="qty-btn" onclick="changeQty(${i},1)">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ΝΕΑ ΣΥΝΑΡΤΗΣΗ ΓΙΑ ΑΝΟΙΓΜΑ/ΚΛΕΙΣΙΜΟ ΕΠΙΣΤΗΜΟΝΙΚΩΝ ΔΕΔΟΜΕΝΩΝ
        function toggleScience(i) {
            const el = document.getElementById(`science-${i}`);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function getQty(index) {
            return Math.max(0, parseInt(document.getElementById(`qty-${index}`).value) || 0);
        }

        function getGiftQty(qty, productName) {
            if (isNutriMX(productName)) return 0;
            if (qty >= 24) return 6;
            if (qty >= 18) return 3;
            if (qty >= 9) return 1;
            return 0;
        }

        function getCart() {
            return products.map((p, i) => {
                const qty = getQty(i);
                if (qty <= 0) return null;
                const giftQty = getGiftQty(qty, p.name);
                return {
                    index: i,
                    name: p.name,
                    price: p.price,
                    qty,
                    giftQty,
                    lineTotal: qty * p.price
                };
            }).filter(Boolean);
        }

        function getAppliedMixTier(totalQty, tiers) {
            for (const tier of tiers) {
                if (totalQty >= tier.minQty) return tier;
            }
            return null;
        }

        function calculateMixDiscounts(cart) {
            const details = [];
            let totalMixDiscount = 0;

            for (const group of MIX_GROUPS) {
                const groupItems = cart.filter(item => group.products.includes(item.name));
                if (!groupItems.length) continue;

                const totalQty = groupItems.reduce((sum, item) => sum + item.qty, 0);
                const subtotal = groupItems.reduce((sum, item) => sum + item.lineTotal, 0);
                const tier = getAppliedMixTier(totalQty, group.tiers);

                if (tier) {
                    const discountValue = subtotal * (tier.pct / 100);
                    totalMixDiscount += discountValue;

                    details.push({
                        code: group.code,
                        title: group.title,
                        qty: totalQty,
                        subtotal: subtotal,
                        pct: tier.pct,
                        value: discountValue,
                        products: groupItems.map(x => `${x.name} (${x.qty})`)
                    });
                }
            }

            return { totalMixDiscount, details };
        }

        function calculateOrderSummary() {
            const cart = getCart();
            const grossNet = cart.reduce((sum, item) => sum + item.lineTotal, 0);

            const gifts = cart
                .filter(item => item.giftQty > 0)
                .map(item => ({
                    name: item.name,
                    purchasedQty: item.qty,
                    giftQty: item.giftQty
                }));

            const { totalMixDiscount, details: mixDetails } = calculateMixDiscounts(cart);

            const afterMix = grossNet - totalMixDiscount;
            const volPerc = afterMix >= 200 ? Math.min(10, Math.floor(afterMix / 100)) : 0;
            const volDiscVal = afterMix * (volPerc / 100);

            const isCash = document.querySelector('input[name="payment"]:checked')?.value === "Αντικαταβολή Μετρητά";
            const cashDiscVal = (afterMix - volDiscVal) * (isCash ? 0.02 : 0);

            const netFinal = afterMix - volDiscVal - cashDiscVal;
            const vatAmount = netFinal * 0.24;
            const totalFinal = netFinal + vatAmount;

            return {
                cart,
                gifts,
                mixDetails,
                grossNet,
                totalMixDiscount,
                afterMix,
                volPerc,
                volDiscVal,
                cashDiscVal,
                netFinal,
                vatAmount,
                totalFinal,
                isCash,
                effectiveDiscountPct: grossNet > 0 ? ((grossNet - netFinal) / grossNet) * 100 : 0
            };
        }

        function formatGiftBreakdown(gifts) {
            if (!gifts.length) return "Δεν υπάρχουν δώρα ακόμη.";
            return gifts.map(g =>
                `<div class="mini-line gift-line"><span>${g.name}</span><span>Δώρο ${g.giftQty} τεμ</span></div>`
            ).join('');
        }

        function formatDiscountBreakdown(summary) {
            const lines = [];

            summary.mixDetails.forEach(d => {
                lines.push(
                    `<div class="mini-line discount-line"><span>${d.title} (${d.qty} τεμ / ${d.pct}%)</span><span>- ${d.value.toFixed(2)} €</span></div>`
                );
            });

            if (summary.volDiscVal > 0) {
                lines.push(
                    `<div class="mini-line discount-line"><span>Έκπτωση τζίρου (${summary.volPerc}%)</span><span>- ${summary.volDiscVal.toFixed(2)} €</span></div>`
                );
            }

            if (summary.cashDiscVal > 0) {
                lines.push(
                    `<div class="mini-line discount-line"><span>Έκπτωση μετρητών (2%)</span><span>- ${summary.cashDiscVal.toFixed(2)} €</span></div>`
                );
            }

            return lines.length ? lines.join('') : "Δεν υπάρχουν εκπτώσεις ακόμη.";
        }

        function updateTotals() {
            const summary = calculateOrderSummary();

            products.forEach((p, i) => {
                const qty = getQty(i);
                document.getElementById(`total-${i}`).textContent = (qty * p.price).toFixed(2) + " €";
            });

            document.getElementById("init-net").textContent = summary.grossNet.toFixed(2) + " €";
            document.getElementById("mix-disc").textContent = "- " + summary.totalMixDiscount.toFixed(2) + " €";
            document.getElementById("vol-disc").textContent = "- " + summary.volDiscVal.toFixed(2) + " € (" + summary.volPerc + "%)";
            document.getElementById("cash-disc").textContent = "- " + summary.cashDiscVal.toFixed(2) + " €" + (summary.isCash ? " (2%)" : "");
            document.getElementById("net-invoice").textContent = summary.netFinal.toFixed(2) + " €";
            document.getElementById("vat-val").textContent = summary.vatAmount.toFixed(2) + " €";
            document.getElementById("total-val").textContent = summary.totalFinal.toFixed(2) + " €";
            document.getElementById("sticky-total").textContent = summary.totalFinal.toFixed(2) + " €";

            const stickerPct = summary.effectiveDiscountPct > 0 ? summary.effectiveDiscountPct.toFixed(1) : "0";
            document.getElementById("sticky-badge").textContent = `${stickerPct}% DISC.`;

            document.getElementById("gift-breakdown").innerHTML = formatGiftBreakdown(summary.gifts);
            document.getElementById("discount-breakdown").innerHTML = formatDiscountBreakdown(summary);

            const nextThreshold = summary.afterMix < 200 ? 200 : (Math.floor(summary.afterMix / 100) + 1) * 100;
            document.getElementById("progress-text").textContent =
                summary.volPerc >= 10
                    ? "Μέγιστη έκπτωση τζίρου!"
                    : `Προσθέστε ${(nextThreshold - summary.afterMix).toFixed(0)} € για ${Math.floor(nextThreshold / 100)}% τζίρου`;
        }

        function setQty(i, v) {
            document.getElementById(`qty-${i}`).value = v;
            updateTotals();
        }

        function changeQty(i, d) {
            const el = document.getElementById(`qty-${i}`);
            el.value = Math.max(0, (parseInt(el.value) || 0) + d);
            updateTotals();
        }

        function onlyOne(c) {
            document.getElementsByName('payment').forEach(b => {
                if (b !== c) b.checked = false;
            });
            updateTotals();
        }

        function buildPayload() {
            const summary = calculateOrderSummary();

            const customer = {
                afm: document.getElementById('afm').value.trim(),
                eponimia: document.getElementById('eponimia').value.trim(),
                email: document.getElementById('email').value.trim(),
                kinito: document.getElementById('kinito').value.trim(),
                stathero: document.getElementById('stathero').value.trim(),
                doy: document.getElementById('doy').value.trim()
            };

            return {
                action: "submitOrder",
                customer,
                afm: customer.afm,
                eponimia: customer.eponimia,
                email: customer.email,
                kinito: customer.kinito,
                stathero: customer.stathero,
                doy: customer.doy,
                payment: document.querySelector('input[name="payment"]:checked')?.value || "Επιταγή 60 Ημερών",
                remarks: document.getElementById('remarks').value.trim(),
                cart: summary.cart.map(x => ({
                    name: x.name,
                    qty: x.qty,
                    giftQty: x.giftQty,
                    price: x.price,
                    lineTotal: x.lineTotal
                })),
                gifts: summary.gifts,
                mixDiscounts: summary.mixDetails,
                discountAnalysis: {
                    grossNet: summary.grossNet,
                    mixDiscount: summary.totalMixDiscount,
                    afterMix: summary.afterMix,
                    volumeDiscountPercent: summary.volPerc,
                    volumeDiscountValue: summary.volDiscVal,
                    cashDiscountValue: summary.cashDiscVal,
                    netFinal: summary.netFinal,
                    vatAmount: summary.vatAmount,
                    totalFinal: summary.totalFinal
                },
                items: summary.cart.map(x => {
                    const giftText = x.giftQty > 0 ? ` + ΔΩΡΟ ${x.giftQty}` : "";
                    return `${x.name} (${x.qty})${giftText}`;
                }).join(", "),
                giftsSummary: summary.gifts.length
                    ? summary.gifts.map(g => `${g.name}: Δώρο ${g.giftQty} τεμ`).join(" | ")
                    : "Χωρίς δώρα",
                discountsSummary: [
                    ...summary.mixDetails.map(d => `${d.title}: ${d.qty} τεμ => ${d.pct}% = ${d.value.toFixed(2)} €`),
                    `Έκπτωση τζίρου: ${summary.volPerc}% = ${summary.volDiscVal.toFixed(2)} €`,
                    `Έκπτωση μετρητών: ${summary.cashDiscVal.toFixed(2)} €`,
                    `Τελική καθαρή αξία: ${summary.netFinal.toFixed(2)} €`,
                    `ΦΠΑ: ${summary.vatAmount.toFixed(2)} €`,
                    `Τελικό σύνολο: ${summary.totalFinal.toFixed(2)} €`
                ].join(" | ")
            };
        }

        async function processOrder() {
            const payload = buildPayload();

            if (!payload.cart.length) {
                return alert("Κενή παραγγελία!");
            }

            try {
                const r = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                if (r.ok) {
                    alert("Η παραγγελία καταχωρήθηκε!");
                    location.reload();
                    return;
                }

                alert("Υπήρξε πρόβλημα στην αποστολή της παραγγελίας.");
            } catch (e) {
                console.error("processOrder error:", e);
                alert("Υπήρξε πρόβλημα σύνδεσης.");
            }
        }

        async function toggleAdminMode() {
            const pin = prompt("PIN:");
            if (pin === "1234") {
                document.getElementById('hourglass').style.display = 'inline-block';
                try {
                    const r = await fetch(`${SCRIPT_URL}?action=getStock&pin=${encodeURIComponent(pin)}`);
                    const d = await r.json();
                    if (d.success) {
                        products.forEach((p, i) => {
                            const el = document.getElementById(`stock-${i}`);
                            el.style.display = "block";
                            el.textContent = "STOCK: " + (d.inventory[p.name] || 0);
                        });
                    }
                } catch (e) {
                    console.error("toggleAdminMode error:", e);
                }
                document.getElementById('hourglass').style.display = 'none';
            }
        }
    </script>
